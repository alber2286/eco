<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ECO Sistema</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:20px;
}

h2{
text-align:center;
}

.box{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#007bff;
color:white;
border:none;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

.result{
background:#e9ecef;
}

#app{
display:none;
}

</style>

</head>

<body>

<div id="inicio">

<h1 style="text-align:center">ECO MÁQUINAS</h1>

<div style="text-align:center;margin-top:40px">

<button onclick="irLogin()" style="padding:20px;font-size:20px">
Calculadora / Marcadores
</button>

</div>

</div>


<div id="login" style="display:none">

<h2>Acceso ECO</h2>

<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="clave" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>


<div id="app">

<h2>Registro de Lectura</h2>

<div class="box">
<label>Número de Serie</label>
<input type="text" id="serie">
</div>

<div class="box">
<label>Casilla A</label>
<input type="number" id="A" oninput="calcular()">
</div>

<div class="box">
<label>Casilla B</label>
<input type="number" id="B" oninput="calcular()">
</div>

<div class="box">
<label>Resultado E (B - A)</label>
<input type="number" id="E" class="result" readonly>
</div>

<div class="box">
<label>Casilla C</label>
<input type="number" id="C" oninput="calcular()">
</div>

<div class="box">
<label>Casilla D</label>
<input type="number" id="D" oninput="calcular()">
</div>

<div class="box">
<label>Resultado F (D - C)</label>
<input type="number" id="F" class="result" readonly>
</div>

<div class="box">
<label>Total G (E - F)</label>
<input type="number" id="G" class="result" readonly>
</div>

<button onclick="enviarDatos()">Enviar</button>

</div>


<script>

let usuarios = {
"eco1":"1234",
"eco2":"1234",
"eco3":"1234",
"eco4":"1234",
"eco5":"1234",
"eco6":"1234",
"eco7":"1234",
"eco8":"1234",
"eco9":"1234",
"eco10":"1234",
"eco11":"1234",
"eco12":"1234",
"eco13":"1234",
"eco14":"1234",
"eco15":"1234"
};

function irLogin(){

document.getElementById("inicio").style.display="none";
document.getElementById("login").style.display="block";

}

function login(){

let u = document.getElementById("usuario").value;
let p = document.getElementById("clave").value;

if(usuarios[u] && usuarios[u] === p){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Usuario o contraseña incorrectos");

}

}

function calcular(){

let A = parseFloat(document.getElementById("A").value) || 0;
let B = parseFloat(document.getElementById("B").value) || 0;
let C = parseFloat(document.getElementById("C").value) || 0;
let D = parseFloat(document.getElementById("D").value) || 0;

let E = B - A;
let F = D - C;
let G = E - F;

document.getElementById("E").value = E;
document.getElementById("F").value = F;
document.getElementById("G").value = G;

}

function enviarDatos(){

let serie = document.getElementById("serie").value;
let B = document.getElementById("B").value;
let D = document.getElementById("D").value;

if(!serie || !B || !D){
alert("Complete Serie, Casilla B y Casilla D");
return;
}

let fecha = new Date().toLocaleDateString();

let formData = new FormData();

formData.append("serie", serie);
formData.append("casillaB", B);
formData.append("casillaD", D);
formData.append("fecha", fecha);

fetch("https://script.google.com/macros/s/AKfycbwmgeG6_F0BKiAW1A7bXizZ70HHUd0pMFkn7K0InK1z6-5viXtAyseeGAUq3ivMpu2C/exec", {

method: "POST",
body: formData

})
.then(() => {

alert("Datos enviados");

})
.catch(() => {

alert("Error al enviar");

});

}

</script>

</body>

</html>
