<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<title>Registro de Lecturas</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:20px;
}

h2{
text-align:center;
}

.box{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#007bff;
color:white;
border:none;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

.result{
background:#e9ecef;
}

</style>

</head>

<body>

<h2>Registro de Lectura</h2>

<div class="box">
<label>Número de Serie</label>
<input type="text" id="serie">
</div>

<div class="box">
<label>Casilla A</label>
<input type="number" id="A" oninput="calcular()">
</div>

<div class="box">
<label>Casilla B</label>
<input type="number" id="B" oninput="calcular()">
</div>

<div class="box">
<label>Resultado E (B - A)</label>
<input type="number" id="E" class="result" readonly>
</div>

<div class="box">
<label>Casilla C</label>
<input type="number" id="C" oninput="calcular()">
</div>

<div class="box">
<label>Casilla D</label>
<input type="number" id="D" oninput="calcular()">
</div>

<div class="box">
<label>Resultado F (D - C)</label>
<input type="number" id="F" class="result" readonly>
</div>

<div class="box">
<label>Total G (E - F)</label>
<input type="number" id="G" class="result" readonly>
</div>

<button onclick="enviarDatos()">Enviar</button>

<script>

function calcular(){

let A = parseFloat(document.getElementById("A").value) || 0;
let B = parseFloat(document.getElementById("B").value) || 0;
let C = parseFloat(document.getElementById("C").value) || 0;
let D = parseFloat(document.getElementById("D").value) || 0;

let E = B - A;
let F = D - C;
let G = E - F;

document.getElementById("E").value = E;
document.getElementById("F").value = F;
document.getElementById("G").value = G;

}

function limpiar(){

["serie","A","B","C","D","E","F","G"].forEach(id=>{
document.getElementById(id).value="";
});

}

function enviarDatos(){

let serie = document.getElementById("serie").value;
let B = document.getElementById("B").value;
let D = document.getElementById("D").value;

if(!serie || !B || !D){
alert("Complete Serie, Casilla B y Casilla D");
return;
}

let fecha = new Date().toLocaleDateString();

let formData = new FormData();

formData.append("serie", serie);
formData.append("casillaB", B);
formData.append("casillaD", D);
formData.append("fecha", fecha);

fetch("https://script.google.com/macros/s/AKfycbwmgeG6_F0BKiAW1A7bXizZ70HHUd0pMFkn7K0InK1z6-5viXtAyseeGAUq3ivMpu2C/exec", {

method: "POST",
body: formData

})
.then(() => {

alert("Datos enviados");
limpiar();

})
.catch(() => {

alert("Error al enviar");

});

}
</script>

</body>
</html>
